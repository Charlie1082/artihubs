name: Predeploy Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  predeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run predeploy checks
        run: node scripts/predeploy-check.mjs
