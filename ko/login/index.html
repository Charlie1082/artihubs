  <body>
    <main class="page auth-page">
      <nav class="nav stack-nav">
        <a class="brand" href="../">
          <img src="../../assets/artihubs-mark.svg" alt="" />
          <span>Artihubs</span>
        </a>
        <div class="nav-links" aria-label="주요 내비게이션">
          <a href="../living-globe-v2/">리빙 글로브</a>
          <a href="../for-makers/">메이커</a>
          <a href="../for-seekers/">시커</a>
          <a href="../explore/">허브 탐색</a>
          <a class="is-active" aria-current="page" href="../login/">로그인</a>
          <a href="../signup/">가입</a>
          <a class="language-link" href="../../login/">English</a>
        </div>
        <div class="mobile-nav-actions">
          <a class="mobile-join" href="../signup/">가입</a>
          <details class="mobile-menu">
            <summary aria-label="내비게이션 열기">
              <span></span>
              <span></span>
              <span></span>
            </summary>
            <div class="mobile-menu-panel" aria-label="모바일 내비게이션">
              <a href="../living-globe-v2/">리빙 글로브</a>
              <a href="../explore/">허브 탐색</a>
              <a href="../for-makers/">메이커</a>
              <a href="../for-seekers/">시커</a>
              <a class="is-active" aria-current="page" href="../login/">로그인</a>
              <a class="language-link" href="../../login/">English</a>
            </div>
          </details>
        </div>
      </nav>

      <section class="auth-shell login-layout" aria-labelledby="login-title">
        <div class="auth-copy">
          <p class="eyebrow">워크스페이스로 돌아가기</p>
          <h1 id="login-title">로그인</h1>
          <p class="lede">메이커 프로필, 시커 요청, 검토 대기열로 돌아가세요.</p>
          <div class="auth-proof-grid">
            <div><strong>프로필 초안</strong><span>비공개 메이커 프로필 작업을 이어갑니다.</span></div>
            <div><strong>시커 요청</strong><span>구조화된 요청과 매칭을 다시 확인합니다.</span></div>
            <div><strong>검토 대기열</strong><span>관리자 접근은 역할 권한으로 제한됩니다.</span></div>
          </div>
        </div>

        <form class="form-panel auth-card" data-login-form>
          <div class="form-grid">
            <div class="field full">
              <label for="login-email">이메일</label>
              <input id="login-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="field full">
              <label for="login-password">비밀번호</label>
              <input id="login-password" name="password" type="password" autocomplete="current-password" minlength="8" required />
            </div>
          </div>
          <button class="button primary" type="submit">로그인</button>
          <div class="auth-link-row">
            <button class="button secondary" type="button" data-forgot-password>비밀번호를 잊으셨나요?</button>
            <a class="button secondary" href="../signup/">계정 만들기</a>
          </div>
          <p class="form-status" data-auth-status aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="../../auth-flow.js"></script>
  </body>
</html>
